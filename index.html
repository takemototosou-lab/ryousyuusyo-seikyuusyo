<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f4ed" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="請求書・領収書" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <title>takemototosou 請求書・領収書</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">takemototosou</p>
          <h1>請求書・領収書</h1>
        </div>
        <div class="save-status" id="saveStatus">保存済み</div>
      </header>

      <section class="mode-panel" aria-label="書類切替">
        <div class="segmented" role="group">
          <button class="segment is-active" type="button" data-mode-button="invoice">請求書</button>
          <button class="segment" type="button" data-mode-button="receipt">領収書</button>
        </div>
        <label class="toggle-row">
          <input id="paymentConfirmed" type="checkbox" />
          <span>入金確認済み</span>
        </label>
      </section>

      <section class="notice hidden" id="receiptLockNotice">
        領収書は入金確認済みにすると作成できます。
      </section>

      <div class="workspace">
        <form class="editor" id="documentForm">
          <section class="panel">
            <h2>宛名</h2>
            <div class="grid two">
              <label>
                <span>宛名</span>
                <input id="customerName" name="customerName" autocomplete="organization" placeholder="株式会社〇〇 御中" />
              </label>
              <label>
                <span>件名</span>
                <input id="subject" name="subject" placeholder="塗装工事 一式" />
              </label>
              <label>
                <span>請求日 / 発行日</span>
                <input id="issueDate" name="issueDate" type="date" />
              </label>
              <label>
                <span>支払期限</span>
                <input id="dueDate" name="dueDate" type="date" />
              </label>
              <label>
                <span>請求書番号</span>
                <input id="invoiceNumber" name="invoiceNumber" placeholder="INV-2026-001" />
              </label>
              <label>
                <span>領収書番号</span>
                <input id="receiptNumber" name="receiptNumber" placeholder="REC-2026-001" />
              </label>
            </div>
            <div class="action-row">
              <button class="secondary" type="button" id="saveCustomerButton">宛名を記憶</button>
              <button class="secondary" type="button" id="openCustomerButton">宛名一覧</button>
            </div>
          </section>

          <section class="panel">
            <h2>発行者</h2>
            <div class="grid two">
              <label>
                <span>屋号 / 会社名</span>
                <input id="companyName" name="companyName" autocomplete="organization" placeholder="takemototosou" />
              </label>
              <label>
                <span>代表者</span>
                <input id="companyPerson" name="companyPerson" autocomplete="name" placeholder="竹本 太郎" />
              </label>
              <label>
                <span>住所</span>
                <input id="companyAddress" name="companyAddress" autocomplete="street-address" placeholder="大阪府..." />
              </label>
              <label>
                <span>電話番号</span>
                <input id="companyTel" name="companyTel" inputmode="tel" autocomplete="tel" placeholder="090-0000-0000" />
              </label>
              <label>
                <span>登録番号</span>
                <input id="invoiceRegistration" name="invoiceRegistration" placeholder="T1234567890123" />
              </label>
              <label>
                <span>振込先</span>
                <input id="bankInfo" name="bankInfo" placeholder="〇〇銀行 〇〇支店 普通 0000000" />
              </label>
            </div>
            <label class="toggle-row inline">
              <input id="taxExempt" name="taxExempt" type="checkbox" />
              <span>免税事業者として作成する</span>
            </label>
          </section>

          <section class="panel">
            <div class="section-head">
              <h2>明細</h2>
              <button class="icon-button" id="addItemButton" type="button" aria-label="明細を追加">＋</button>
            </div>
            <div class="items" id="itemsList"></div>
          </section>

          <section class="panel">
            <h2>備考</h2>
            <label>
              <span>メモ</span>
              <textarea id="notes" name="notes" rows="4" placeholder="お振込み手数料はご負担ください。"></textarea>
            </label>
          </section>

          <section class="sticky-actions">
            <button class="primary" id="pdfButton" type="button">PDF生成</button>
            <button class="line" id="lineButton" type="button">LINE共有</button>
            <button class="secondary" id="backupButton" type="button">バックアップ</button>
          </section>
        </form>

        <aside class="preview-wrap">
          <div class="preview-toolbar">
            <span id="previewLabel">請求書プレビュー</span>
            <span id="previewTotal">0円</span>
          </div>
          <article class="paper" id="documentPreview" aria-label="書類プレビュー"></article>
        </aside>
      </div>

      <section class="panel backup-panel">
        <div class="section-head">
          <h2>バックアップ</h2>
          <button class="secondary danger" id="clearBackupsButton" type="button">全削除</button>
        </div>
        <div class="backup-list" id="backupList"></div>
      </section>
    </main>

    <dialog class="dialog" id="customerDialog">
      <div class="dialog-head">
        <h2>宛名一覧</h2>
        <button class="icon-button" id="closeCustomerButton" type="button" aria-label="閉じる">×</button>
      </div>
      <div class="customer-list" id="customerList"></div>
    </dialog>
  </body>
</html>
