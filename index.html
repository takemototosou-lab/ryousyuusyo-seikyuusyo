<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f3f4f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>takemototosou 出勤日管理</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <main class="page">
      <div class="app">
        <div class="header">
          <button class="nav-button" id="prevMonth" type="button">←</button>
          <h1 id="monthTitle"></h1>
          <button class="nav-button" id="nextMonth" type="button">→</button>
        </div>

        <div class="tabs">
          <button class="tab-button active" id="inputTab" type="button">入力</button>
          <button class="tab-button" id="summaryTab" type="button">集計</button>
        </div>

        <section class="field">
          <label for="closingDay">締め日</label>
          <input id="closingDay" type="number" min="1" max="31" inputmode="numeric" />
        </section>

        <section id="inputPage">
          <div id="savedBanner"></div>
          <div class="calendar-head" id="calendarHead"></div>
          <div class="calendar" id="calendar"></div>

          <div class="panel">
            <p class="panel-title" id="selectedDateTitle"></p>

            <div class="field">
              <label for="siteInput">現場名</label>
              <input id="siteInput" type="text" placeholder="現場名" />
            </div>

            <div class="field">
              <div class="label">記憶した現場名</div>
              <div class="history-list" id="siteHistory"></div>
            </div>

            <div class="field">
              <div class="label">勤務</div>
              <div class="mark-grid">
                <button class="choice-button" id="markWork" type="button">○</button>
                <button class="choice-button" id="markHalf" type="button">△</button>
              </div>
            </div>

            <div class="field">
              <label for="priceInput">日当</label>
              <input id="priceInput" type="number" inputmode="numeric" step="100" placeholder="日当" />
            </div>

            <div class="field">
              <div class="label">インボイス</div>
              <div class="invoice-grid">
                <button class="choice-button" id="invoiceOn" type="button">有り</button>
                <button class="choice-button" id="invoiceOff" type="button">無し</button>
              </div>
            </div>

            <div class="save-preview" id="savePreview"></div>
            <button class="save-button" id="saveButton" type="button">保存</button>
            <div class="saved-message" id="savedMessage"></div>
          </div>
        </section>

        <section class="hidden" id="summaryPage">
          <div class="summary-box">
            <div class="summary-top row">
              <h2>現場別集計</h2>
              <button class="small-button" id="toggleAll" type="button">全選択</button>
            </div>
            <div id="summaryList"></div>
            <div class="summary-total">
              <span>選択合計</span>
              <span id="selectedTotal">0円</span>
            </div>
          </div>
          <button class="line-button" id="lineButton" type="button">チェックした現場をLINEで共有</button>
        </section>
      </div>
    </main>
    <script src="app.js" defer></script>
  </body>
</html>
