<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f3f4f6" />
    <meta name="format-detection" content="telephone=no" />
    <title>工事写真帳</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header no-print">
        <div>
          <p class="eyebrow">工事写真用</p>
          <h1>工事写真帳</h1>
          <p class="lead">写真の横に説明欄。1ページ2件でA4縦PDF保存向きです。</p>
        </div>
        <div class="toolbar" aria-label="操作">
          <button class="button primary" id="addItemButton" type="button" title="写真枠を追加">
            <span class="button-icon" aria-hidden="true">+</span>
            <span>写真枠追加</span>
          </button>
          <button class="button secondary" id="printButton" type="button" title="印刷またはPDF保存">
            <span class="button-icon" aria-hidden="true">↓</span>
            <span>PDF生成</span>
          </button>
        </div>
      </header>

      <section class="settings-panel no-print" aria-label="写真帳設定">
        <label>
          <span>表題</span>
          <input id="albumTitle" type="text" value="工事写真帳" />
        </label>
        <label>
          <span>工事名</span>
          <input id="projectName" type="text" placeholder="例：外壁塗装工事" />
        </label>
        <label>
          <span>日付</span>
          <input id="albumDate" type="date" />
        </label>
        <label>
          <span>施工者</span>
          <input id="contractorName" type="text" placeholder="例：takemototosou" />
        </label>
      </section>

      <section id="printArea" class="print-area" aria-label="工事写真帳"></section>
    </main>
  </body>
</html>
